name: Cleanup copilot branches

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete-copilot-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all copilot/* branches
        uses: actions/github-script@v7
        with:
          script: |
            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const branch of branches) {
              if (branch.name.startsWith('copilot/')) {
                try {
                  console.log(`Deleting branch: ${branch.name}`);
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${branch.name}`,
                  });
                } catch (error) {
                  console.log(`Failed to delete branch ${branch.name}: ${error.message}`);
                }
              }
            }

            console.log('Done. All copilot/* branches deleted.');
